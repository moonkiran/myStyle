<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 레시피 페이지</title>
</head>
<body>
    <h1>🥗양배추참치덮밥</h1>
    <img src="https://recipe1.ezmember.co.kr/cache/recipe/2024/05/01/91b453f13070883278c285a181a1267e1.jpg" alt="양배추참치덮밥 이미지" width="200" title="양배추참치덮밥">
    <hr>

    <div>
        <h2>재료</h2>
        <table border="1">
            <thead>
                <tr>
                    <th>재료</th>
                    <th>양</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>밥</td>
                    <td>반공기</td>
                </tr>
                <tr>
                    <td>양배추</td>
                    <td>200g~250g</td>
                </tr>
                <tr>
                    <td>참치</td>
                    <td>작은거 한캔</td>
                </tr>
                <tr>
                    <td>굴소스</td>
                    <td>한 숟가락</td>
                </tr>
                <tr>
                    <td>멸치액젓</td>
                    <td>반 숟가락</td>
                </tr>
            </tbody>
        </table>
    </div>
    <hr>

    <div>
        <h2>조리순서</h2>
        <ol>
            <li>양배추를 기름에 볶아요</li>
            <li>양배추가 어느정도 익으면 굴소스와 멸치액젓을 넣고 볶아요</li>
            <li>참치캔을 넣고 볶아요</li>
            <li>다 볶으면 밥 위에 덮밥처럼 올려요</li>
            <li>마지막으로 깨를 솔솔 뿌려요 이 과정은 생략해도 돼요😊</li>
        </ol>
        <a href="https://m.blog.naver.com/aldudcldud/223303707960" target="_blank">▶블로그 레시피 보기</a>
    </div>
    <hr>

    <div>
        <h2>주의사항</h2>
        <ul>
            <li>참치캔의 기름은 빼주세요!</li>
            <li>굴소스와 멸치액젓을 너무 많이 넣으면 짜요ㅠㅠ</li>
        </ul>
    </div>
</body>
</html>
